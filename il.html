<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/gezginbirbaykus/" />
  <title>Gezginbirbaykus</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo-area">
        <img src="assets/Logo.png" alt="Gezginbirbaykus Logo" onerror="this.style.display='none'" />
        <span class="logo-text">Gezginbirbaykus</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html">Ana Sayfa</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" aria-label="Gece modu"></button>
      </div>
    </div>
  </header>

  <!-- BREADCRUMB -->
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">Ana Sayfa</a>
    <span>/</span>
    <a href="#" id="bc-ulke-link">Ülke</a>
    <span>/</span>
    <span id="bc-il">Yükleniyor...</span>
  </div>

  <!-- HERO -->
  <section class="page-hero" id="il-hero" style="display:none;">
    <h1 id="il-ad"></h1>
    <p class="subtitle" id="il-aciklama"></p>
  </section>

  <!-- MAIN -->
  <main class="main-content">
    <h2 class="section-title" id="ilceler-baslik">İlçeler</h2>
    <div id="ilce-listesi" class="story-grid">
      <div class="loading">
        <div class="spinner"></div>
        <p>Yükleniyor...</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-logo">Gezginbirbaykus</p>
    <a href="https://www.instagram.com/gezginbirbaykus_/" target="_blank" rel="noopener noreferrer" class="footer-insta">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      @gezginbirbaykus_
    </a>
    <p>© 2026 — Tüm hakları saklıdır.</p>
  </footer>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { doc, getDoc, collection, getDocs, query, orderBy, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    toggle.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const params = new URLSearchParams(window.location.search);
    const ilId = params.get('id');

    async function yukle() {
      if (!ilId) { window.location = 'index.html'; return; }

      // İl bilgisi
      const ilDoc = await getDoc(doc(db, 'iller', ilId));
      if (!ilDoc.exists()) { window.location = 'index.html'; return; }

      const il = ilDoc.data();
      document.title = `${il.ad} — Gezginbirbaykus`;
      document.getElementById('bc-il').textContent = il.ad;
      document.getElementById('il-ad').textContent = il.ad;
      document.getElementById('il-aciklama').textContent = il.plaka ? `Plaka: ${il.plaka}` : '';
      document.getElementById('il-hero').style.display = '';
      document.getElementById('ilceler-baslik').textContent = `${il.ad} — İlçeler`;

      // Ülke breadcrumb
      if (il.ulkeId) {
        const ulkeDoc = await getDoc(doc(db, 'ulkeler', il.ulkeId));
        if (ulkeDoc.exists()) {
          const link = document.getElementById('bc-ulke-link');
          link.textContent = ulkeDoc.data().ad;
          link.href = `ulke.html?id=${il.ulkeId}`;
        }
      }

      // İlçeler
      const liste = document.getElementById('ilce-listesi');
      const q = query(collection(db, 'ilceler'), where('ilId', '==', ilId));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        liste.innerHTML = `<div class="empty-state"><div class="owl-icon">🦉</div><p>Henüz ilçe eklenmemiş.</p></div>`;
        return;
      }

      liste.innerHTML = '';
      const ilceler = [];
      snapshot.forEach(d => {
        ilceler.push({ id: d.id, ...d.data() });
      });
      ilceler.sort((a, b) => a.ad.localeCompare(b.ad, 'tr'));
      
      ilceler.forEach(d => {
        const ilce = d;
        liste.innerHTML += `
          <a href="ilce.html?id=${d.id}" class="story-card">
            <div class="story-ring">
              <div class="story-inner">
                ${ilce.fotograf ? `<img src="${ilce.fotograf}" alt="${ilce.ad}" />` : '📍'}
              </div>
            </div>
            <span class="story-name">${ilce.ad}</span>
          </a>`;
      });
    }

    yukle();
  </script>

</body>
</html>
