<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gezginbirbaykus — Türkiye'yi Keşfet</title>
  <meta name="description" content="Türkiye'nin illerini ve ilçelerini keşfet. Gezginbirbaykus ile her köşeyi tanı." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo-area">
        <img src="assets/Logo.png" alt="Gezginbirbaykus Logo" onerror="this.style.display='none'" />
        <span class="logo-text">Gezginbirbaykus</span>
      </a>
      <div class="header-right">
        <nav class="main-nav">
          <a href="index.html" class="active">Ana Sayfa</a>
          <a href="#ulkeler">Keşfet</a>
        </nav>
        <button class="theme-toggle" id="theme-toggle" aria-label="Gece modu"></button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-logo-wrap">
        <img src="assets/Logo.png" alt="Gezginbirbaykus" class="hero-logo-light" onerror="this.style.display='none'" />
        <img src="assets/Logo2.png" alt="Gezginbirbaykus" class="hero-logo-dark" onerror="this.style.display='none'" />
      </div>
      <h1>Dünyanın her ilçesini gezmek isteyen bir baykuş.</h1>
    </div>
  </section>

  <!-- MAIN -->
  <main class="main-content" id="ulkeler">
    <h2 class="section-title">Ülkeler</h2>

    <div id="ulke-listesi" class="story-grid">
      <!-- Yükleniyor -->
      <div class="loading">
        <div class="spinner"></div>
        <p>Yükleniyor...</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="footer-logo">Gezginbirbaykus</p>
    <p class="footer-copy">© 2026 — Tüm hakları saklıdır.</p>
  </footer>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // Gece modu
    const toggle = document.getElementById('theme-toggle');
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    toggle.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const liste = document.getElementById('ulke-listesi');

    async function ulkeleriYukle() {
      try {
        const snapshot = await getDocs(collection(db, 'ulkeler'));

        if (snapshot.empty) {
          liste.innerHTML = `
            <div class="empty-state">
              <div class="owl-icon">🦉</div>
              <p>Henüz içerik eklenmemiş. Yakında geliyor!</p>
            </div>`;
          return;
        }

        // Türkiye önce, geri kalanlar alfabetik
        const ulkeler = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        ulkeler.sort((a, b) => {
          const aTr = a.ad.replace(/^[^a-zA-ZğüşıöçĞÜŞİÖÇ]+/, '').toLowerCase().startsWith('türkiye');
          const bTr = b.ad.replace(/^[^a-zA-ZğüşıöçĞÜŞİÖÇ]+/, '').toLowerCase().startsWith('türkiye');
          if (aTr && !bTr) return -1;
          if (!aTr && bTr) return 1;
          return a.ad.localeCompare(b.ad, 'tr');
        });

        liste.innerHTML = '';
        ulkeler.forEach(d => {
          liste.innerHTML += `
            <a href="ulke.html?id=${d.id}" class="story-card">
              <div class="story-ring">
                <div class="story-inner">
                  ${d.fotograf ? `<img src="${d.fotograf}" alt="${d.ad}" />` : '🌍'}
                </div>
              </div>
              <span class="story-name">${d.ad}</span>
            </a>`;
        });
      } catch (err) {
        liste.innerHTML = `<div class="empty-state"><p>Bir hata oluştu. Lütfen sayfayı yenileyin.</p></div>`;
        console.error(err);
      }
    }

    ulkeleriYukle();
  </script>

</body>
</html>
